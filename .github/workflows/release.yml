name: Validate and release VSIX

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # package-vsix.ps1 derives the VSIX patch version from commit count.
          # A shallow tag checkout would otherwise package every release as 0.1.1.
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Validate extension sources
        shell: pwsh
        run: |
          node --check extension.js
          node --check media/chat.js
          node --test (Get-ChildItem -Path tests -Filter '*.test.js' | Select-Object -ExpandProperty FullName)
          Get-Content -Raw -Encoding utf8 package.json | ConvertFrom-Json | Out-Null
      - name: Build VSIX
        shell: pwsh
        run: .\package-vsix.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: ollama-offline-agent-vsix
          path: '*.vsix'
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: '*.vsix'
